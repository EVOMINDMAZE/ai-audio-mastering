# =============================================================================
# Render Blueprint — AI Audio Mastering
# =============================================================================
# Apply via Render Dashboard:
#   1. Go to https://dashboard.render.com/blueprints
#   2. Click "New Blueprint Instance"
#   3. Connect the GitHub repo (EVOMINDMAZE/ai-audio-mastering)
#   4. Render detects this file and creates the web service
#
# Validate locally with:
#   render blueprints validate render.yaml
#
# On every push to `main`, Render auto-rebuilds the service from the same
# Dockerfile used for HF Spaces and Koyeb. Behaviour matches both environments
# — including the ephemeral `JOB_TMP_DIR=/tmp/audio_jobs` disk.
#
# Note: free web services on Render sleep after 15 minutes of inactivity
# (~30–50 s cold start). The free plan is the only no-credit-card option on
# Render; paid Starter ($7/mo) removes the sleep.
# =============================================================================

services:
  - type: web
    name: ai-audio-mastering
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      # PORT is set automatically by Render to 10000 on free tier;
      # the existing CMD already honours ${PORT:-7860}.
      - key: JOB_TMP_DIR
        value: /tmp/audio_jobs
      # NOTE: CORS_ORIGINS is parsed by pydantic-settings as a JSON array
      # for the List[str] field — pass a JSON array, not a bare "*".
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: SUPABASE_ENABLED
        value: "false"
      # main.py resolves the static frontend directory as
      #   _BACKEND_DIR = Path(__file__).resolve().parent  # → /app/backend/app
      # which is one level too shallow — the Dockerfile copies dist to
      # /app/backend/frontend_dist (two levels above main.py). Override here
      # until main.py is fixed upstream.
      - key: FRONTEND_DIST
        value: /app/backend/frontend_dist
      # Render free tier is 512 MB RAM. Three concurrent renders each hold
      # ~250 MB (input float32 + pedalboard intermediates + output) — that
      # OOM-kills the worker. Force serial rendering.
      - key: MAX_RENDER_WORKERS
        value: "1"
      # ~3 minutes of 44.1 kHz / 16-bit stereo WAV. Longer tracks risk OOM
      # even with the single-worker pool.
      - key: MAX_UPLOAD_MB
        value: "25"
      # Force single-thread BLAS inside numpy / librosa / pedalboard so we
      # don't fan out into per-thread working buffers.
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: NUMEXPR_NUM_THREADS
        value: "1"
      # AI Mastering (DeepSeek). Disabled by default — the Space keeps working
      # as a regular preset-based mastering tool until DEEPSEEK_API_KEY is
      # supplied and LLM_ENABLED flipped to true via the Space/Render UI.
      - key: LLM_ENABLED
        value: "false"
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com/v1
      - key: REFERENCE_MASTERING_ENABLED
        value: "true"
      - key: GENRE_CLASSIFICATION_ENABLED
        value: "true"